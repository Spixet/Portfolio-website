<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Phone screen gradient -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- Glowing effect for phone -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- App icon gradient -->
    <linearGradient id="iconGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#ef4444" />
    </linearGradient>
    
    <linearGradient id="iconGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <linearGradient id="iconGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  
  <!-- Background rectangle -->
  <rect width="800" height="600" fill="url(#bgGradient)" />
  
  <!-- Grid pattern -->
  <g stroke="#4a6cf7" stroke-opacity="0.15">
    <defs>
      <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" />
      </pattern>
    </defs>
    <rect width="800" height="600" fill="url(#grid)" />
  </g>
  
  <!-- Main smartphone in center -->
  <g transform="translate(400, 300)" filter="url(#glow)">
    <!-- Phone outer case -->
    <rect x="-115" y="-210" width="230" height="420" rx="30" ry="30" 
          fill="#1e293b" stroke="#4a6cf7" stroke-width="2" />
    
    <!-- Phone screen -->
    <rect x="-100" y="-190" width="200" height="380" rx="15" ry="15" 
          fill="#0f172a" stroke="#4a6cf7" stroke-width="1" />
    
    <!-- Status bar -->
    <rect x="-100" y="-190" width="200" height="25" rx="15" ry="15" 
          fill="#0f172a" stroke="#4a6cf7" stroke-width="0.5" />
    
    <!-- Status bar icons -->
    <text x="-85" y="-172" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">5G</text>
    <rect x="50" y="-182" width="15" height="8" rx="1" ry="1" fill="#94a3b8" />
    <rect x="70" y="-182" width="10" height="8" rx="1" ry="1" fill="#94a3b8" />
    
    <!-- App screen with content -->
    <rect x="-90" y="-155" width="180" height="335" fill="url(#screenGradient)" />
    
    <!-- Navigation bar at bottom of screen -->
    <rect x="-90" y="180" width="180" height="10" rx="5" ry="5" fill="#1e293b" />
    <circle cx="0" cy="185" r="2.5" fill="#94a3b8" />
    
    <!-- App content -->
    <!-- Header -->
    <rect x="-90" y="-155" width="180" height="40" fill="#1e293b" />
    <text x="0" y="-130" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle">Mobile App</text>
    <circle cx="-70" cy="-135" r="10" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <path d="M-70,-138 L-70,-132 M-73,-135 L-67,-135" stroke="#94a3b8" stroke-width="1.5" />
    <circle cx="70" cy="-135" r="10" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <path d="M70,-138 L70,-132 M70,-135 L70,-135" stroke="#94a3b8" stroke-width="1.5" />
    
    <!-- Tab bar -->
    <rect x="-90" y="-115" width="180" height="30" fill="#1e293b" />
    <text x="-60" y="-95" font-family="Arial, sans-serif" font-size="10" fill="#4a6cf7" text-anchor="middle">Home</text>
    <text x="0" y="-95" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Explore</text>
    <text x="60" y="-95" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Profile</text>
    <rect x="-75" y="-85" width="30" height="2" fill="#4a6cf7" rx="1" ry="1" />
    
    <!-- Content Items -->
    <!-- First card -->
    <rect x="-80" y="-75" width="160" height="70" rx="8" ry="8" fill="#1e293b" />
    <rect x="-70" y="-65" width="50" height="50" rx="6" ry="6" fill="url(#iconGrad1)" />
    <text x="5" y="-45" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Feature 1</text>
    <text x="5" y="-30" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Lorem ipsum dolor</text>
    
    <!-- Second card -->
    <rect x="-80" y="5" width="160" height="70" rx="8" ry="8" fill="#1e293b" />
    <rect x="-70" y="15" width="50" height="50" rx="6" ry="6" fill="url(#iconGrad2)" />
    <text x="5" y="35" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Feature 2</text>
    <text x="5" y="50" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Lorem ipsum dolor</text>
    
    <!-- Third card -->
    <rect x="-80" y="85" width="160" height="70" rx="8" ry="8" fill="#1e293b" />
    <rect x="-70" y="95" width="50" height="50" rx="6" ry="6" fill="url(#iconGrad3)" />
    <text x="5" y="115" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Feature 3</text>
    <text x="5" y="130" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Lorem ipsum dolor</text>
    
    <!-- Bottom button -->
    <rect x="-60" y="165" width="120" height="30" rx="15" ry="15" fill="#4a6cf7" />
    <text x="0" y="185" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Get Started</text>
    
    <!-- Home button/indicator -->
    <rect x="-20" y="195" width="40" height="5" rx="2.5" ry="2.5" fill="#94a3b8" />
  </g>
  
  <!-- Decorative floating app icons around the phone -->
  <!-- App icon 1 -->
  <g transform="translate(200, 150)">
    <rect x="-25" y="-25" width="50" height="50" rx="10" ry="10" fill="url(#iconGrad1)" filter="url(#glow)" />
    <circle cx="0" cy="0" r="15" fill="#ffffff" fill-opacity="0.2" />
    <path d="M-10,-10 L10,10 M-10,10 L10,-10" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- App icon 2 -->
  <g transform="translate(600, 150)">
    <rect x="-25" y="-25" width="50" height="50" rx="10" ry="10" fill="url(#iconGrad2)" filter="url(#glow)" />
    <circle cx="0" cy="0" r="15" fill="#ffffff" fill-opacity="0.2" />
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ffffff" stroke-width="3" />
  </g>
  
  <!-- App icon 3 -->
  <g transform="translate(200, 450)">
    <rect x="-25" y="-25" width="50" height="50" rx="10" ry="10" fill="url(#iconGrad3)" filter="url(#glow)" />
    <circle cx="0" cy="0" r="15" fill="#ffffff" fill-opacity="0.2" />
    <rect x="-8" y="-8" width="16" height="16" fill="none" stroke="#ffffff" stroke-width="3" />
  </g>
  
  <!-- App icon 4 -->
  <g transform="translate(600, 450)">
    <rect x="-25" y="-25" width="50" height="50" rx="10" ry="10" fill="url(#iconGrad4)" filter="url(#glow)" />
    <circle cx="0" cy="0" r="15" fill="#ffffff" fill-opacity="0.2" />
    <path d="M0,-10 L10,10 L-10,10 Z" fill="none" stroke="#ffffff" stroke-width="3" />
  </g>
  
  <!-- "MOBILE PROJECT" text at bottom -->
  <text x="400" y="520" font-family="'Arial', sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">
    MOBILE PROJECT
  </text>
  
  <!-- Decorative mobile UI elements in corners -->
  <g fill="none" stroke="#4a6cf7" stroke-width="1" stroke-opacity="0.4">
    <!-- Top left - toggle switch -->
    <rect x="50" y="45" width="30" height="15" rx="7.5" ry="7.5" stroke="#4a6cf7" fill="#1e293b" />
    <circle cx="70" cy="52.5" r="6" fill="#4a6cf7" />
    
    <!-- Top right - notification -->
    <rect x="700" y="45" width="50" height="15" rx="7.5" ry="7.5" stroke="#4a6cf7" fill="#1e293b" />
    <circle cx="710" cy="52.5" r="3" fill="#4a6cf7" />
    <path d="M720,49 L740,49 M720,52.5 L740,52.5 M720,56 L735,56" stroke="#4a6cf7" stroke-width="1" />
    
    <!-- Bottom left - nav icon -->
    <rect x="50" y="540" width="15" height="15" rx="2" ry="2" stroke="#4a6cf7" />
    <rect x="70" y="540" width="15" height="15" rx="2" ry="2" stroke="#4a6cf7" />
    <rect x="50" y="560" width="15" height="15" rx="2" ry="2" stroke="#4a6cf7" />
    <rect x="70" y="560" width="15" height="15" rx="2" ry="2" stroke="#4a6cf7" />
    
    <!-- Bottom right - wireless icon -->
    <path d="M700,555 Q710,540 720,555 M705,555 Q710,545 715,555" stroke="#4a6cf7" stroke-width="1.5" />
    <circle cx="710" cy="558" r="2" fill="#4a6cf7" />
  </g>
</svg> 