<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="skillGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6cf7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#2c3e50" stop-opacity="0.9" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="50" cy="50" r="45" fill="url(#skillGradient)" />
  
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.7" />
  
  <!-- Gear icon representing skills/technology -->
  <g transform="translate(50, 50)">
    <!-- Outer gear teeth -->
    <path d="M0,-32 L4,-28 L4,-18 L8,-14 L18,-14 L22,-18 L32,0 L28,4 L18,4 L14,8 L14,18 L18,22 L0,32 L-4,28 L-4,18 L-8,14 L-18,14 L-22,18 L-32,0 L-28,-4 L-18,-4 L-14,-8 L-14,-18 L-18,-22 Z" 
          fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.9" />
    
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.9" />
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#ffffff" fill-opacity="0.9" />
  </g>
  
  <!-- Small decorative dots around the edge -->
  <g fill="#ffffff" fill-opacity="0.6">
    <circle cx="20" cy="20" r="1.5" />
    <circle cx="80" cy="20" r="1.5" />
    <circle cx="20" cy="80" r="1.5" />
    <circle cx="80" cy="80" r="1.5" />
    <circle cx="50" cy="12" r="1.5" />
    <circle cx="50" cy="88" r="1.5" />
    <circle cx="12" cy="50" r="1.5" />
    <circle cx="88" cy="50" r="1.5" />
  </g>
</svg> 